# specgen/source/constants.yaml
# Language-neutral parameter defaults. Source of truth for both ni_params_pkg.sv
# and ni_params.h. See design spec §4.1.
schema_version: "1.0"

axi:
  ID_WIDTH:
    type: int
    units: bits
    description: "AXI transaction ID width"
    default: 8
    min: 1
    max: 32
    # NOTE: spec range is 1..32 per AXI4 IHI 0022 §A2.2.1, but c_model + DPI
    # currently hardcode 8 (see static_assert in c_model/include/axi/types.hpp
    # AXI_ID_SPACE check, and the AXI_ID_WIDTH wiring in cosim2/c/cmodel_dpi.cpp).
    # Widen the impl side before relaxing this max.
    sv_symbol: NI_AXI_ID_WIDTH_DFLT
    cpp_symbol: NI_AXI_ID_WIDTH
  ADDR_WIDTH:
    type: int
    units: bits
    description: "AXI address bus width"
    default: 64
    min: 1
    max: 64
    # NOTE: spec range is 1..64 per AXI4 IHI 0022 §A2.2.1, but the DPI pack_addr64
    # helper in cosim2/c/cmodel_dpi.cpp hardcodes a 64-bit split into svBitVecVal[2].
    # Reparameterize pack_addr64 before narrowing or relaxing this max.
    sv_symbol: NI_AXI_ADDR_WIDTH_DFLT
    cpp_symbol: NI_AXI_ADDR_WIDTH
  DATA_WIDTH:
    type: int
    units: bits
    description: "AXI data bus width"
    default: 256
    allowed: [32, 64, 128, 256, 512, 1024]
    # NOTE: spec allows the widths listed in `allowed`, but c_model + DPI currently
    # hardcode 256-bit (DATA_BYTES = 32 in c_model/include/axi/types.hpp, and the
    # svBitVecVal[8] data marshalling in cosim2/c/cmodel_dpi.cpp). Widen the impl
    # side before picking a different `allowed` value.
    sv_symbol: NI_AXI_DATA_WIDTH_DFLT
    cpp_symbol: NI_AXI_DATA_WIDTH

noc:
  NUM_VC:
    type: int
    units: count
    description: "Number of virtual channels per NoC link"
    default: 1
    min: 1
    max: 8
    sv_symbol: NI_NOC_NUM_VC_DFLT
    cpp_symbol: NI_NOC_NUM_VC
  FLIT_WIDTH:
    type: int
    units: bits
    description: "NoC flit payload width"
    default: 408
    min: 64
    max: 1024
    sv_symbol: NI_NOC_FLIT_WIDTH_DFLT
    cpp_symbol: NI_NOC_FLIT_WIDTH
  SLAVE_VC_BUFFER_DEPTH:
    type: int
    units: flits
    description: "Per-VC buffer depth at NoC slave; defines initial credit count exposed to producer"
    default: 4
    min: 1
    max: 64
    sv_symbol: NI_NOC_SLAVE_VC_BUFFER_DEPTH_DFLT
    cpp_symbol: NI_NOC_SLAVE_VC_BUFFER_DEPTH

derived:
  WSTRB_WIDTH:
    type: int
    units: bits
    description: "AXI write strobe width"
    expression: "DATA_WIDTH / 8"
    constraint: "DATA_WIDTH % 8 == 0"
    sv_symbol: NI_AXI_WSTRB_WIDTH_DFLT
    cpp_symbol: NI_AXI_WSTRB_WIDTH
