config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 2
  read_latency: 2
  max_outstanding_write: 1
  max_outstanding_read: 1
transactions:
  - op: write
    addr: 0x1000
    id: 0x0
    len: 0
    size: 5
    burst: INCR
    data_file: ../tests/fixtures/single_beat_aa_data.txt
  - op: write
    addr: 0x1020
    id: 0x1
    len: 0
    size: 5
    burst: INCR
    data_file: ../tests/fixtures/single_beat_bb_data.txt
  - op: read
    addr: 0x1000
    id: 0x0
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
  - op: read
    addr: 0x1020
    id: 0x1
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
