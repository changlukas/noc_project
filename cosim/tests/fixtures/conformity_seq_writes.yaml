# Cosim PoC conformity smoke — two sequential single-beat writes (same ID)
# then two reads. Tests write-before-read ordering at the AXI boundary.
# Sequential same-ID writes use max_outstanding_write=1 implicitly.
# See cosim/KNOWN_LIMITATIONS.md for why multi-outstanding is excluded.
config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 1
  read_latency: 1
transactions:
  - op: write
    addr: 0x1000
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    data_file: fixtures/conformity_seq_writes_data_a.txt
  - op: write
    addr: 0x1020
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    data_file: fixtures/conformity_seq_writes_data_b.txt
  - op: read
    addr: 0x1000
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
  - op: read
    addr: 0x1020
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
