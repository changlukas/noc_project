# Cosim PoC conformity smoke — single-beat write with high memory latency.
# Exercises the MAXSTALL/MAXDELAY timeout path in wb2axip (F_AXI_MAXDELAY=64
# override in tb_axi_conformity.sv gives margin for write_latency=5).
# max_outstanding_write=1 (implicit default) required by the DPI snapshot
# model; see cosim/KNOWN_LIMITATIONS.md.
config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 5
  read_latency: 1
transactions:
  - op: write
    addr: 0x1000
    id: 0x1
    len: 0
    size: 5
    burst: INCR
    data_file: fixtures/conformity_backpressure_data.txt
  - op: read
    addr: 0x1000
    id: 0x1
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
