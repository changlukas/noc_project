# Cosim PoC conformity smoke — single-beat write+read, low latency.
# Scoped to max_outstanding_write=1 (implicit default) because the DPI
# snapshot model presents one AW per tick; see cosim/KNOWN_LIMITATIONS.md.
config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 1
  read_latency: 1
transactions:
  - op: write
    addr: 0x1000
    id: 0x3
    len: 0
    size: 5
    burst: INCR
    data_file: fixtures/conformity_write_read_data.txt
  - op: read
    addr: 0x1000
    id: 0x3
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
