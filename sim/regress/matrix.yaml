# Flat co-sim regression matrix (flat). Run one build with
# `make sim-regress BUILD=<build>`, or all builds with `make sim-regress`.
# all_independent_ax4 / all_dependent_ax4 expand from metadata.address_mode.
topologies: [mesh_4x4_vc1, mesh_4x4_vc2, mesh_4x4_vc4, mesh_4x4_vc8]
rob_modes:  [disabled, enabled]
stimuli:
  - {from: all_independent_ax4, patterns: [neighbor, uniform_random, transpose, hotspot]}
  - {from: all_dependent_ax4,   patterns: [neighbor], preserve_addr: true}
  - {from: AX4-BAS-002, patterns: [neighbor], id_policy: round_robin:4}
exclusions:
  - {when: {rob_mode: enabled, from: AX4-BUR-003},
     reason: "burst len 256 > ROB_CAPACITY 32"}
  # BND-005 / BND-006 un-excluded 2026-06-30: both HUNG on the read sub-burst
  # AR-drop deadlock, fixed by the WireSlavePort push_ar gate
  # (commit fix/cosim-ar-drop-deadlock). Re-verified green under 16-node load.
  # ORD-002 un-excluded 2026-07-01: the multi-id "data mismatch" was the
  # WireSlavePort AW-replay bug (push_aw latched last_aw_ before the delivered
  # gate, so a multi-id same-tick walk presented the LAST id and replayed it).
  # Fixed by gating push_aw/w/ar at OFFER time. Re-verified green (64 reads, 0
  # mismatch under 16-node concurrent load).
