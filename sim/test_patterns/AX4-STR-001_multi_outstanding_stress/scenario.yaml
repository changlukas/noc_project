schema_version: 1
metadata:
  name: AX4-STR-001_multi_outstanding_stress
  category: stress

config:
  memory_base: 0x1000
  # 8 distinct addresses under the dependent/preserve-addr group need per-node
  # unique-offset room; the 0x1000 window overflowed alloc_unique_offset at
  # seq>=4 (16 nodes * stride 0x40). 0x4000 covers the 8-outstanding spread.
  memory_size: 0x4000
  write_latency: 1
  read_latency: 1
  max_outstanding_write: 8
  max_outstanding_read: 8
transactions:
  - op: write
    addr: 0x1000
    id: 0x1
    len: 0
    size: 5
    burst: INCR
    data_file: data_1.txt
  - op: write
    addr: 0x1020
    id: 0x2
    len: 0
    size: 5
    burst: INCR
    data_file: data_2.txt
