schema_version: 1
metadata:
  name: AX4-INF-001_dpi_fatal_on_init_failure
  category: infrastructure

# Infrastructure scenario: tests DPI fatal propagation via nonexistent data file.
# A nonexistent data_file causes cmodel_init to fail, resulting in a DPI error
# at first posedge, then $fatal in tb_top.sv and a non-zero exit.
# Purpose: verify the error propagation path is live (not AXI4 A3.2 AW stability).
config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 1
  read_latency: 1
  max_outstanding_write: 1
  max_outstanding_read: 1
  inject:
    mode: aw_unstable
    cycle: 1
transactions:
  - op: write
    addr: 0x1000
    id: 0x0
    len: 0
    size: 5
    burst: INCR
    data_file: nonexistent_data_file.txt
