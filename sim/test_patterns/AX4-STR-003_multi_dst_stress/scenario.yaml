schema_version: 1
metadata:
  name: AX4-STR-003_multi_dst_stress
  category: stress

# multi_dst_stress: exercises ROB Disabled stall path + same-id concurrent read.
#
# 2 same-id writes at XYRouting dst boundaries (0x100 -> dst=0, 0x10100 -> dst=1).
# AxiMaster (post AXI4 conformity fix) admits both AWs concurrently. ROB sees
# AW1 pass, AW2 stall on the dst mismatch until AW1's B response runs Rob's
# pop_b. After AW2 releases, both writes complete.
#
# 2 same-id reads then verify data integrity end-to-end through Rob's
# Depacketizer side. Scoreboard's expected_ map matches reads against the
# original writes by address.
#
# Note: current ChannelModel is dst-agnostic FIFO, so out-of-order B/R responses
# don't naturally occur in this round. The fixture validates Rob does not
# BREAK existing same-id behavior. A regression gate for actual out-of-order
# response handling lands next round when per-dst ChannelModel latency is
# enabled.
#
# Per-fixture override: testbench forces max_outstanding_write >= 2 (default may be 1).
config:
  memory_base: 0x0
  memory_size: 0x12000
  write_latency: 0
  read_latency: 0
transactions:
  - op: write
    addr: 0x100
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    data_file: data.txt
  - op: write
    addr: 0x10100
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    data_file: data.txt
  - op: read
    addr: 0x100
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
  - op: read
    addr: 0x10100
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
