schema_version: 1
metadata:
  name: AX4-EXC-003_exclusive_intervening_write
  category: exclusive
  address_mode: independent

config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 1
  read_latency: 1
transactions:
  - op: read
    addr: 0x1000
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    lock: exclusive
    dump_file: r_intv_read.txt
  - op: write
    addr: 0x1000
    id: 0x3
    len: 0
    size: 5
    burst: INCR
    data_file: data.txt
  - op: write
    addr: 0x1000
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    lock: exclusive
    data_file: excl.txt
  - op: read
    addr: 0x1000
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    dump_file: r_intv_verify.txt
