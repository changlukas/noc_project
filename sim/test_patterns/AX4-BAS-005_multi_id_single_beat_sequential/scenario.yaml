schema_version: 1
metadata:
  name: AX4-BAS-005_multi_id_single_beat_sequential
  category: basic
  address_mode: independent

config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 2
  read_latency: 2
  max_outstanding_write: 1
  max_outstanding_read: 1
transactions:
  - op: write
    addr: 0x1000
    id: 0x0
    len: 0
    size: 5
    burst: INCR
    data_file: ../_data/data_aa.txt
  - op: write
    addr: 0x1020
    id: 0x1
    len: 0
    size: 5
    burst: INCR
    data_file: ../_data/data_bb.txt
  - op: write
    addr: 0x1040
    id: 0x2
    len: 0
    size: 5
    burst: INCR
    data_file: ../_data/data_aa.txt
  - op: write
    addr: 0x1060
    id: 0x3
    len: 0
    size: 5
    burst: INCR
    data_file: ../_data/data_bb.txt
  - op: read
    addr: 0x1000
    id: 0x0
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
  - op: read
    addr: 0x1020
    id: 0x1
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
  - op: read
    addr: 0x1040
    id: 0x2
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
  - op: read
    addr: 0x1060
    id: 0x3
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
