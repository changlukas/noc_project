schema_version: 1
metadata:
  name: AX4-STR-001_latency_stress
  category: stress

config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 20
  read_latency: 20
transactions:
  - op: write
    addr: 0x1000
    id: 0x6
    len: 0
    size: 5
    burst: INCR
    data_file: data.txt
  - op: read
    addr: 0x1000
    id: 0x6
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
