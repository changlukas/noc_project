# IHI 0022H §A3.4.1: WRAP burst, AxLEN=1 (2-beat). Wrap boundary equals
# 2 * (1<<size) = 64 bytes. Start addr aligned to size and within wrap
# region.
schema_version: 1
metadata:
  name: AX4-BUR-007_wrap_len_2
  category: burst

config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 1
  read_latency: 1
transactions:
  - op: write
    addr: 0x1000
    id: 0
    len: 1
    size: 5
    burst: WRAP
    data_file: data.txt
  - op: read
    addr: 0x1000
    id: 0
    len: 1
    size: 5
    burst: WRAP
    dump_file: unused
