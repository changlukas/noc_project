# Fault injection scenario: aw_unstable at cycle 1 with non-existent data_file
# forces cmodel_init to fail (data_file not found), causing DPI error at first
# posedge → $fatal in shell wrapper → non-zero exit.
# This verifies: (a) error propagation path is live, (b) wb2axip/DPI liveness.
config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 1
  read_latency: 1
  max_outstanding_write: 1
  max_outstanding_read: 1
  inject:
    mode: aw_unstable
    cycle: 1
transactions:
  - op: write
    addr: 0x1000
    id: 0x0
    len: 0
    size: 5
    burst: INCR
    data_file: nonexistent_data_file.txt
