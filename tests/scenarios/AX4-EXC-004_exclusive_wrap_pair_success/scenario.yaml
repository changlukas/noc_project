config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 1
  read_latency: 1
transactions:
  - op: read
    addr: 0x1000
    id: 0x5
    len: 1
    size: 5
    burst: WRAP
    lock: exclusive
    dump_file: r_wrap_read.txt
  - op: write
    addr: 0x1000
    id: 0x5
    len: 1
    size: 5
    burst: WRAP
    lock: exclusive
    data_file: data.txt
  - op: read
    addr: 0x1000
    id: 0x5
    len: 1
    size: 5
    burst: WRAP
    dump_file: r_wrap_verify.txt
