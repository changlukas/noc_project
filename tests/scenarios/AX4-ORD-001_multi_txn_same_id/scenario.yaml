schema_version: 1
metadata:
  name: AX4-ORD-001_multi_txn_same_id
  category: ordering

config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 1
  read_latency: 1
transactions:
  - op: write
    addr: 0x1000
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    data_file: data_a.txt
  - op: write
    addr: 0x1020
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    data_file: data_b.txt
  - op: read
    addr: 0x1000
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
  - op: read
    addr: 0x1020
    id: 0x5
    len: 0
    size: 5
    burst: INCR
    dump_file: unused
