config:
  memory_base: 0x1000
  memory_size: 0x1000
  write_latency: 1
  read_latency: 1
# Phase B-5b combined: 4-beat size=5 burst with per-beat sparse WSTRB.
# Each beat enables a different 8-byte lane group, exercising B-1 sparse
# WSTRB infrastructure across multiple beats. The read dump reflects the
# memory after byte-merged writes; scoreboard validates byte equivalence.
transactions:
  - op: write
    addr: 0x1000
    id: 0x2
    len: 3
    size: 5
    burst: INCR
    data_file: data.txt
    strb_file: strb.txt
  - op: read
    addr: 0x1000
    id: 0x2
    len: 3
    size: 5
    burst: INCR
    dump_file: unused.txt
