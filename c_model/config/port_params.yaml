# NMU/NSU port-pair parameters and test-fixture sizings.
# Each loader (load_nmu_port_params / load_nsu_port_params /
# load_channel_model_params) parses its own top-level block.

nmu:
  queues:
    aw_queue_depth: 32
    w_queue_depth:  32
    ar_queue_depth: 32
    b_queue_depth:  32
    r_queue_depth:  32
  depacketize:
    b_q_depth: 32
    r_q_depth: 32

nsu:
  queues:
    aw_queue_depth: 32
    w_queue_depth:  32
    ar_queue_depth: 32
    b_queue_depth:  32
    r_queue_depth:  32
  depacketize:
    aw_q_depth: 32
    w_q_depth:  32
    ar_q_depth: 32
  meta_buffer:
    per_id_depth: 4

channel_model:
  req_depth: 32
  rsp_depth: 32
